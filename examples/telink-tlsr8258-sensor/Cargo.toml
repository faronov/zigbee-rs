[package]
name = "telink-tlsr8258-sensor"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
zigbee-types = { path = "../../zigbee-types" }
zigbee-mac = { path = "../../zigbee-mac", features = ["telink"] }
zigbee-nwk = { path = "../../zigbee-nwk" }
zigbee-aps = { path = "../../zigbee-aps" }
zigbee-zcl = { path = "../../zigbee-zcl" }
zigbee-runtime = { path = "../../zigbee-runtime" }

# Embassy async runtime
embassy-time = { version = "0.5" }
embassy-time-driver = "0.2"
embassy-futures = "0.1"

# For CI stub builds (thumbv6m stand-in)
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"

# Portable atomics for tc32 (no native CAS)
portable-atomic = { version = "1", features = ["unsafe-assume-single-core"] }

# Logging
log = "0.4"

# Panic handler
panic-halt = "1.0"

[features]
default = []
stubs = []

[profile.release]
opt-level = "s"
lto = true
