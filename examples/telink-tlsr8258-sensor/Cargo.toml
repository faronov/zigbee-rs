[package]
name = "telink-tlsr8258-sensor"
version = "0.1.0"
edition = "2024"
build = "build.rs"
autobins = false

[[bin]]
name = "telink-tlsr8258-runtime"
path = "src/runtime_main.rs"
required-features = ["runtime-sensor"]

[[bin]]
name = "telink-tlsr8258-lab"
path = "src/main.rs"
required-features = ["lab"]

# EXPERIMENTAL — join/relay-only router (no child association). See
# src/runtime_router.rs and README.md "Router firmware" for scope and
# limitations.
[[bin]]
name = "telink-tlsr8258-router"
path = "src/main_router.rs"
required-features = ["runtime-router"]

[dependencies]
zigbee-types = { path = "../../zigbee-types" }
zigbee-mac = { path = "../../zigbee-mac" }
tlsr8258-hal = { path = "../../tlsr8258-hal", optional = true }
zigbee-nwk = { path = "../../zigbee-nwk" }
zigbee-aps = { path = "../../zigbee-aps" }
zigbee-zcl = { path = "../../zigbee-zcl" }
zigbee-zdo = { path = "../../zigbee-zdo" }
zigbee-bdb = { path = "../../zigbee-bdb" }
zigbee-runtime = { path = "../../zigbee-runtime" }

# Logging (stub — no output backend yet)
log = "0.4"
heapless = "0.9"

# Panic handler
panic-halt = "1.0"

[features]
default = ["runtime-sensor"]
lab = []
diag-beacon = ["lab"]
diag-assoc = ["lab"]
diag-smoke = ["lab"]
sensor = ["lab"]
runtime-sensor = ["dep:tlsr8258-hal", "zigbee-mac/tlsr8258"]
# EXPERIMENTAL router firmware: join + non-beacon relay only. Does not,
# and must not, gain child-association/beacon/permit-joining/indirect-queue
# support merely by enabling this feature — see README.md.
runtime-router = ["dep:tlsr8258-hal", "zigbee-mac/tlsr8258"]

[profile.release]
# Optimize the complete stack as one unit. The tc32 backend rejects
# opt-level="z", while "s" plus fat LTO fits the 256 KiB OTA slot.
opt-level = "s"
lto = "fat"
codegen-units = 1
