[package]
name = "telink-tlsr8258-sensor"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
zigbee-types = { path = "../../zigbee-types" }
zigbee-mac = { path = "../../zigbee-mac" }
zigbee-nwk = { path = "../../zigbee-nwk", features = ["telink-debug"] }
zigbee-aps = { path = "../../zigbee-aps", features = ["telink-debug"] }
zigbee-zcl = { path = "../../zigbee-zcl" }
zigbee-zdo = { path = "../../zigbee-zdo", features = ["telink-debug"] }
zigbee-bdb = { path = "../../zigbee-bdb", features = ["telink-debug"] }
zigbee-runtime = { path = "../../zigbee-runtime" }

# Logging (stub — no output backend yet)
log = "0.4"
heapless = "0.9"

# Panic handler
panic-halt = "1.0"

[features]
default = ["runtime-sensor"]
diag-beacon = []
diag-assoc = []
diag-smoke = []
sensor = []
runtime-sensor = []

[profile.release]
opt-level = "s"
lto = true
