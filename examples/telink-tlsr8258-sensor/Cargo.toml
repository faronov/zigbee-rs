[package]
name = "telink-tlsr8258-sensor"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
zigbee-types = { path = "../../zigbee-types" }
zigbee-mac = { path = "../../zigbee-mac" }
tlsr8258-hal = { path = "../../tlsr8258-hal", optional = true }
zigbee-nwk = { path = "../../zigbee-nwk" }
zigbee-aps = { path = "../../zigbee-aps" }
zigbee-zcl = { path = "../../zigbee-zcl" }
zigbee-zdo = { path = "../../zigbee-zdo" }
zigbee-bdb = { path = "../../zigbee-bdb" }
zigbee-runtime = { path = "../../zigbee-runtime" }

# Logging (stub — no output backend yet)
log = "0.4"
heapless = "0.9"

# Panic handler
panic-halt = "1.0"

[features]
default = ["runtime-sensor"]
diag-beacon = []
diag-assoc = []
diag-smoke = []
sensor = []
runtime-sensor = ["dep:tlsr8258-hal", "zigbee-mac/tlsr8258"]

[profile.release]
# Match the hardware-proven reusable TLSR8258 backend build. The helper also
# passes these settings to the final crate explicitly, but dependencies must
# use the same profile to avoid tc32 LTO/codegen differences.
opt-level = 1
lto = false
