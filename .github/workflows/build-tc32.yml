name: Build TLSR8258 (tc32)

on:
  push:
    branches: [master, main, develop]
    paths:
      - "examples/telink-tlsr8258-sensor/**"
      - "examples/telink-tlsr8258-router/**"
      - "tools/telink-tlsr8258-lab/**"
      - "scripts/tlsr8258.sh"
      - "tools/tlsr8258-firmware.sh"
      - "examples/telink-tlsr8258-radio/**"
      - "tlsr8258-hal/**"
      - "tlsr8258-rt/**"
      - "zigbee-*/**"
      - ".github/workflows/build-tc32.yml"
  pull_request:
    branches: [master, main, develop]
    paths:
      - "examples/telink-tlsr8258-sensor/**"
      - "examples/telink-tlsr8258-router/**"
      - "tools/telink-tlsr8258-lab/**"
      - "scripts/tlsr8258.sh"
      - "tools/tlsr8258-firmware.sh"
      - "examples/telink-tlsr8258-radio/**"
      - "tlsr8258-hal/**"
      - "tlsr8258-rt/**"
      - "zigbee-*/**"
      - ".github/workflows/build-tc32.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tc32-${{ github.ref }}
  cancel-in-progress: true

env:
  TC32_TOOLCHAIN_URL: https://github.com/modern-tc32/rust/releases/download/tc32-stage2-tc32-45/tc32-rust-toolchain-linux-amd64.tar.gz
  TC32_TOOLCHAIN_DIR: ${{ github.workspace }}/.toolchains/tc32-stage2-tc32-45

jobs:
  build:
    name: Production and lab firmware
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install tc32-45 toolchain
        run: |
          mkdir -p "$TC32_TOOLCHAIN_DIR"
          curl -fL --retry 3 "$TC32_TOOLCHAIN_URL" -o /tmp/tc32.tar.gz
          tar -xzf /tmp/tc32.tar.gz --strip-components=1 -C "$TC32_TOOLCHAIN_DIR"
          "$TC32_TOOLCHAIN_DIR/bin/rustc" --version --verbose

      - name: Cache tc32 build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/telink-tlsr8258-sensor/target
            examples/telink-tlsr8258-router/target
            tools/telink-tlsr8258-lab/target
            examples/telink-tlsr8258-radio/target
          key: tc32-45-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml', '**/memory*.x') }}

      - name: Build production sensor and router
        run: |
          mkdir -p target/tlsr8258-artifacts
          ./scripts/tlsr8258.sh build sensor
          cp examples/telink-tlsr8258-sensor/target/tc32-unknown-none-elf/release/telink-tlsr8258-sensor.bin \
            target/tlsr8258-artifacts/telink-tlsr8258-sensor.bin
          ./scripts/tlsr8258.sh build router
          cp examples/telink-tlsr8258-router/target/tc32-unknown-none-elf/release/telink-tlsr8258-router.bin \
            target/tlsr8258-artifacts/telink-tlsr8258-router.bin

      - name: Build hardware lab matrix
        run: |
          for mode in diag-beacon diag-assoc diag-smoke diag-pm lab-sensor; do
            ./scripts/tlsr8258.sh build "$mode"
            cp tools/telink-tlsr8258-lab/target/tc32-unknown-none-elf/release/telink-tlsr8258-lab.bin \
              "target/tlsr8258-artifacts/telink-tlsr8258-${mode}.bin"
          done

      - name: Build standalone radio harness
        working-directory: examples/telink-tlsr8258-radio
        run: |
          ./scripts/tlsr8258.sh build
          cp target/tc32-unknown-none-elf/release/telink-tlsr8258-radio.bin \
            ../../target/tlsr8258-artifacts/telink-tlsr8258-radio.bin

      - name: Run host radio tests
        run: |
          HOST_TARGET="$(rustc +stable -vV | sed -n 's/^host: //p')"
          cargo +stable test --manifest-path examples/telink-tlsr8258-radio/Cargo.toml \
            --release --target "$HOST_TARGET"

      - name: Upload TLSR8258 binaries
        uses: actions/upload-artifact@v4
        with:
          name: telink-tlsr8258-tc32-45-${{ github.sha }}
          path: target/tlsr8258-artifacts/*.bin
          if-no-files-found: error
          retention-days: 30

  quality:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cargo fmt --manifest-path examples/telink-tlsr8258-sensor/Cargo.toml -- --check
          cargo fmt --manifest-path examples/telink-tlsr8258-router/Cargo.toml -- --check
          cargo fmt --manifest-path tools/telink-tlsr8258-lab/Cargo.toml -- --check
          cargo fmt --manifest-path examples/telink-tlsr8258-radio/Cargo.toml -- --check
