name: Build TLSR8258 (TC32 real firmware)

# This workflow builds real tc32-unknown-none-elf firmware for the TLSR8258
# using the modern-tc32 Rust toolchain (published as public release on
# modern-tc32/rust). No secrets required.
#
# Triggers:
# - Push to master that touches Telink files
# - PR that touches Telink files
# - Manual dispatch (workflow_dispatch)

on:
  push:
    branches: [master]
    paths:
      - 'examples/telink-tlsr8258-sensor/**'
      - 'zigbee-*/**'
      - '.github/workflows/build-tc32.yml'
  pull_request:
    paths:
      - 'examples/telink-tlsr8258-sensor/**'
      - 'zigbee-*/**'
      - '.github/workflows/build-tc32.yml'
  workflow_dispatch:
    inputs:
      tc32_release_tag:
        description: 'modern-tc32/rust release tag'
        required: false
        default: 'tc32-stage2-tc32-43'
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TC32_RELEASE_TAG_DEFAULT: tc32-stage2-tc32-43

jobs:
  build-tlsr8258-tc32:
    name: Build TLSR8258 real firmware (tc32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download TC32 toolchain from public release
        run: |
          TAG="${{ inputs.tc32_release_tag || env.TC32_RELEASE_TAG_DEFAULT }}"
          URL="https://github.com/modern-tc32/rust/releases/download/${TAG}/tc32-rust-toolchain-linux-amd64.tar.gz"
          echo "Downloading ${URL}"
          curl -fSL --retry 5 --retry-delay 5 -o /tmp/tc32.tar.gz "$URL"

      - name: Unpack TC32 toolchain
        run: |
          tar -xzf /tmp/tc32.tar.gz -C $HOME/
          # Tarball extracts to tc32-stage2-x86_64-unknown-linux-gnu/
          TC32_DIR="$HOME/tc32-stage2-x86_64-unknown-linux-gnu"
          test -x "$TC32_DIR/bin/rustc"
          test -x "$TC32_DIR/bin/cargo"
          test -x "$TC32_DIR/llvm/bin/llvm-objcopy"
          echo "TC32_TOOLCHAIN=$TC32_DIR" >> $GITHUB_ENV
          echo "TC32_LLVM_BIN=$TC32_DIR/llvm/bin" >> $GITHUB_ENV

      - name: Verify TC32 toolchain
        run: |
          $TC32_TOOLCHAIN/bin/rustc --version
          $TC32_TOOLCHAIN/bin/rustc --print target-list | grep tc32
          $TC32_TOOLCHAIN/llvm/bin/clang --version
          echo "TC32 toolchain ready"

      - name: Build TLSR8258 sensor (real tc32 firmware)
        working-directory: examples/telink-tlsr8258-sensor
        run: |
          $TC32_TOOLCHAIN/bin/cargo build --release
          echo "=== Build successful ==="
          ls -la target/tc32-unknown-none-elf/release/telink-tlsr8258-sensor

      - name: Create firmware binary
        run: |
          ELF=examples/telink-tlsr8258-sensor/target/tc32-unknown-none-elf/release/telink-tlsr8258-sensor
          $TC32_LLVM_BIN/llvm-objcopy -O binary $ELF ${ELF}.bin
          echo "=== Firmware sizes ==="
          ls -la ${ELF} ${ELF}.bin

      - name: Upload TLSR8258 real firmware
        uses: actions/upload-artifact@v4
        with:
          name: tlsr8258-tc32-firmware
          path: |
            examples/telink-tlsr8258-sensor/target/tc32-unknown-none-elf/release/telink-tlsr8258-sensor.bin

