          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload CC2340 firmware
        uses: actions/upload-artifact@v4
        with:
          name: cc2340-sensor-firmware
          path: |
            examples/cc2340-sensor/target/thumbv6m-none-eabi/release/cc2340-sensor.bin
            examples/cc2340-sensor/target/thumbv6m-none-eabi/release/cc2340-sensor.hex

  build-telink-b91:
    name: Build Telink B91 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imc-unknown-none-elf
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
