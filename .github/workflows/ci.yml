name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Allow deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p zigbee-mac --features mock

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  # ── Cross-compile hardware examples ──────────────────────────
  # These are standalone crates (not workspace members) targeting
  # embedded platforms. We build them to catch regressions in the
  # platform-specific MAC backends.

  build-nrf52840:
    name: Build nRF52840 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/nrf52840-sensor
      - name: Build nRF52840 sensor (release)
        working-directory: examples/nrf52840-sensor
        run: cargo build --release
      - name: Create firmware artifacts
        run: |
          ELF=examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload nRF52840 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840-sensor-firmware
          path: |
            examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor.bin
            examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor.hex

  build-nrf52833:
    name: Build nRF52833 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/nrf52833-sensor
      - name: Build nRF52833 sensor (release)
        working-directory: examples/nrf52833-sensor
        run: cargo build --release
      - name: Create firmware artifacts
        run: |
          ELF=examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload nRF52833 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nrf52833-sensor-firmware
          path: |
            examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor.bin
            examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor.hex

  build-nrf52840-uf2:
    name: Build nRF52840 sensor (UF2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/nrf52840-sensor-uf2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install UF2 converter
        run: pip install --quiet intelhex
      - name: Build nRF52840 UF2 sensor (release)
        working-directory: examples/nrf52840-sensor-uf2
        run: cargo build --release
      - name: Create firmware artifacts (.bin, .hex, .uf2)
        run: |
          ELF=examples/nrf52840-sensor-uf2/target/thumbv7em-none-eabihf/release/nrf52840-sensor-uf2
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex

          echo "=== Firmware sizes ==="
          ls -la ${ELF}.bin ${ELF}.hex

          # Download uf2conv.py from Microsoft's UF2 repo
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o uf2conv.py
          curl -sL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o uf2families.json
          # Convert .hex → .uf2 (hex already contains base address info)
          python uf2conv.py -c -f 0xADA52840 ${ELF}.hex -o ${ELF}.uf2
      - name: Upload nRF52840 UF2 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840-sensor-uf2-firmware
          path: |
            examples/nrf52840-sensor-uf2/target/thumbv7em-none-eabihf/release/nrf52840-sensor-uf2.bin
            examples/nrf52840-sensor-uf2/target/thumbv7em-none-eabihf/release/nrf52840-sensor-uf2.hex
            examples/nrf52840-sensor-uf2/target/thumbv7em-none-eabihf/release/nrf52840-sensor-uf2.uf2

  build-esp32c6:
    name: Build ESP32-C6 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imac-unknown-none-elf
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/esp32c6-sensor
      - name: Build ESP32-C6 sensor (release)
        working-directory: examples/esp32c6-sensor
        run: cargo build --release -Z build-std=core,alloc
      - name: Create firmware artifacts
        run: |
          ELF=examples/esp32c6-sensor/target/riscv32imac-unknown-none-elf/release/esp32c6-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
      - name: Upload ESP32-C6 firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32c6-sensor-firmware
          path: |
            examples/esp32c6-sensor/target/riscv32imac-unknown-none-elf/release/esp32c6-sensor.bin

  build-esp32h2:
    name: Build ESP32-H2 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imac-unknown-none-elf
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/esp32h2-sensor
      - name: Build ESP32-H2 sensor (release)
        working-directory: examples/esp32h2-sensor
        run: cargo build --release -Z build-std=core,alloc
      - name: Create firmware artifacts
        run: |
          ELF=examples/esp32h2-sensor/target/riscv32imac-unknown-none-elf/release/esp32h2-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
      - name: Upload ESP32-H2 firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32h2-sensor-firmware
          path: |
            examples/esp32h2-sensor/target/riscv32imac-unknown-none-elf/release/esp32h2-sensor.bin

  build-bl702:
    name: Build BL702 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imac-unknown-none-elf
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/bl702-sensor
      - name: Build BL702 sensor (release)
        working-directory: examples/bl702-sensor
        run: cargo build --release --features stubs -Z build-std=core,alloc
      - name: Create firmware artifacts
        run: |
          ELF=examples/bl702-sensor/target/riscv32imac-unknown-none-elf/release/bl702-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload BL702 firmware
        uses: actions/upload-artifact@v4
        with:
          name: bl702-sensor-firmware
          path: |
            examples/bl702-sensor/target/riscv32imac-unknown-none-elf/release/bl702-sensor.bin
            examples/bl702-sensor/target/riscv32imac-unknown-none-elf/release/bl702-sensor.hex

  # ── CC2340 (TI, ARM Cortex-M0+) ────────────────────────────
  build-cc2340:
    name: Build CC2340 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv6m-none-eabi
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/cc2340-sensor
      - name: Build CC2340 sensor (release)
        working-directory: examples/cc2340-sensor
        run: cargo build --release --features stubs
      - name: Create firmware artifacts
        run: |
          ELF=examples/cc2340-sensor/target/thumbv6m-none-eabi/release/cc2340-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
