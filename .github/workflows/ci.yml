name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p zigbee-mac --features serial
      - run: cargo check -p zigbee-mac --features mock

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  # ── Cross-compile hardware examples ──────────────────────────
  # These are standalone crates (not workspace members) targeting
  # embedded platforms. We build them to catch regressions in the
  # platform-specific MAC backends.

  build-nrf52840:
    name: Build nRF52840 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/nrf52840-sensor
      - name: Build nRF52840 sensor (release)
        working-directory: examples/nrf52840-sensor
        run: cargo build --release
      - name: Create firmware artifacts
        run: |
          ELF=examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload nRF52840 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nrf52840-sensor-firmware
          path: |
            examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor.bin
            examples/nrf52840-sensor/target/thumbv7em-none-eabihf/release/nrf52840-sensor.hex

  build-nrf52833:
    name: Build nRF52833 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/nrf52833-sensor
      - name: Build nRF52833 sensor (release)
        working-directory: examples/nrf52833-sensor
        run: cargo build --release
      - name: Create firmware artifacts
        run: |
          ELF=examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload nRF52833 firmware
        uses: actions/upload-artifact@v4
        with:
          name: nrf52833-sensor-firmware
          path: |
            examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor.bin
            examples/nrf52833-sensor/target/thumbv7em-none-eabihf/release/nrf52833-sensor.hex

  build-esp32c6:
    name: Build ESP32-C6 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv32imac-unknown-none-elf
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/esp32c6-sensor
      - name: Build ESP32-C6 sensor (release)
        working-directory: examples/esp32c6-sensor
        run: cargo build --release -Z build-std=core,alloc
      - name: Create firmware artifacts
        run: |
          ELF=examples/esp32c6-sensor/target/riscv32imac-unknown-none-elf/release/esp32c6-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
      - name: Upload ESP32-C6 firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32c6-sensor-firmware
          path: |
            examples/esp32c6-sensor/target/riscv32imac-unknown-none-elf/release/esp32c6-sensor.bin
