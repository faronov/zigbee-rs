        uses: actions/upload-artifact@v4
        with:
          name: phy6222-sensor-firmware
          path: |
            examples/phy6222-sensor/target/thumbv6m-none-eabi/release/phy6222-sensor.bin
            examples/phy6222-sensor/target/thumbv6m-none-eabi/release/phy6222-sensor.hex

  # ── Deploy Web Flasher to GitHub Pages ──────────────────────
  # Bundles the flasher HTML with latest ESP firmware binaries
  # so users can flash directly from the browser.
  deploy-flasher:
    name: Deploy Web Flasher
    needs: [build-esp32c6, build-esp32h2]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download ESP32-C6 firmware
        uses: actions/download-artifact@v4
        with:
          name: esp32c6-sensor-firmware
          path: docs/flasher/firmware

      - name: Download ESP32-H2 firmware
        uses: actions/download-artifact@v4
        with:
          name: esp32h2-sensor-firmware
          path: docs/flasher/firmware

      - name: Generate firmware manifest
        run: |
          cat > docs/flasher/manifest.json << 'EOF'
          {
            "name": "Zigbee-RS Sensor Firmware",
            "version": "${{ github.sha }}",
            "builds": [
              {
                "chipFamily": "ESP32-C6",
                "parts": [{ "path": "./firmware/esp32c6-sensor.bin", "offset": 0 }]
              },
              {
                "chipFamily": "ESP32-H2",
                "parts": [{ "path": "./firmware/esp32h2-sensor.bin", "offset": 0 }]
              }
            ]
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/flasher

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
