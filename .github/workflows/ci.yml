          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload Telink TLSR8258 firmware
        uses: actions/upload-artifact@v4
        with:
          name: telink-tlsr8258-sensor-firmware
          path: |
            examples/telink-tlsr8258-sensor/target/thumbv6m-none-eabi/release/telink-tlsr8258-sensor.bin
            examples/telink-tlsr8258-sensor/target/thumbv6m-none-eabi/release/telink-tlsr8258-sensor.hex

  build-phy6222:
    name: Build PHY6222 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv6m-none-eabi
          components: rust-src, llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
