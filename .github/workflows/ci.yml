      - name: Create firmware artifacts
        run: |
          ELF=examples/telink-b91-sensor/target/riscv32imc-unknown-none-elf/release/telink-b91-sensor
          OBJCOPY=$(find $(rustc --print sysroot) -name llvm-objcopy | head -1)
          $OBJCOPY -O binary $ELF ${ELF}.bin
          $OBJCOPY -O ihex   $ELF ${ELF}.hex
      - name: Upload Telink B91 firmware
        uses: actions/upload-artifact@v4
        with:
          name: telink-b91-sensor-firmware
          path: |
            examples/telink-b91-sensor/target/riscv32imc-unknown-none-elf/release/telink-b91-sensor.bin
            examples/telink-b91-sensor/target/riscv32imc-unknown-none-elf/release/telink-b91-sensor.hex

  build-telink-tlsr8258:
    name: Build Telink TLSR8258 sensor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv6m-none-eabi
